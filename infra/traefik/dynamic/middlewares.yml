http:
  routers:
    clawloops_web_public_invite:
      rule: "Host(`clawloops.localhost`) && PathPrefix(`/invite`)"
      priority: 1000
      entryPoints:
        - web
      service: clawloops_web

    clawloops_web_public_assets:
      rule: "Host(`clawloops.localhost`) && (PathPrefix(`/assets`) || Path(`/favicon.ico`) || Path(`/robots.txt`) || Path(`/manifest.webmanifest`))"
      priority: 1000
      entryPoints:
        - web
      service: clawloops_web

    clawloops_api_public_invitations:
      rule: "Host(`clawloops.localhost`) && PathPrefix(`/api/v1/public/invitations`)"
      priority: 1000
      entryPoints:
        - web
      service: clawloops_api

    clawloops_web:
      rule: "Host(`clawloops.localhost`)"
      entryPoints:
        - web
      middlewares:
        - authentik-forwardauth
      service: clawloops_web

    clawloops_api:
      rule: "Host(`clawloops.localhost`) && PathPrefix(`/api`)"
      entryPoints:
        - web
      middlewares:
        - authentik-forwardauth
      service: clawloops_api

    runtime_manager:
      rule: "Host(`runtime-manager.clawloops.localhost`)"
      entryPoints:
        - web
      middlewares:
        - authentik-forwardauth
      service: runtime_manager

    authentik_outpost:
      rule: "Host(`clawloops.localhost`) && PathPrefix(`/outpost.goauthentik.io/`)"
      entryPoints:
        - web
      service: authentik_outpost

  middlewares:
    authentik-forwardauth:
      forwardAuth:
        address: "http://authentik-proxy-outpost:9000/outpost.goauthentik.io/auth/traefik"
        trustForwardHeader: true
        authResponseHeaders:
          - X-authentik-username
          - X-authentik-email
          - X-authentik-name
          - X-authentik-uid
          - X-authentik-groups
          - X-authentik-jwt
          - X-authentik-meta-jwks
          - X-authentik-meta-outpost
          - X-authentik-meta-provider
          - X-authentik-meta-app
          - X-authentik-meta-version

  services:
    clawloops_web:
      loadBalancer:
        servers:
          - url: "http://clawloops-web:3000"
    clawloops_api:
      loadBalancer:
        servers:
          - url: "http://clawloops-api:8000"
    runtime_manager:
      loadBalancer:
        servers:
          - url: "http://runtime-manager:18080"
    authentik_outpost:
      loadBalancer:
        servers:
          - url: "http://authentik-proxy-outpost:9000"
